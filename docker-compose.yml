version: "3.9"

services:
  db:
    image: postgres:15
    container_name: airdropfarm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airdropfarm
    ports:
      - "5432:5432"
    volumes:
      - airdropfarm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airdropfarm"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  airdropfarm_pgdata: